noBtn.addEventListener('mouseover', () => {
    const x = Math.random() * (window.innerWidth - 180);
    const y = Math.random() * (window.innerHeight - 120);
    noBtn.style.position = 'fixed';
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';

    const msgIndex = Math.floor(Math.random() * messages.length);
    noBtn.innerText = messages[msgIndex];

    const randomImage = imageFiles[Math.floor(Math.random() * imageFiles.length)];
    hoverCount += 1;
    question.innerHTML = `<img src="${randomImage}" alt="cute cat" />`;

    scale += 0.15;
    yesBtn.style.transform = `scale(${scale})`;
    const lift = Math.min(40, 18 + (scale - 1) * 15);
    question.style.transform = `translateY(-${lift}px)`;
});

noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    noBtn.dispatchEvent(new Event('mouseover'));
});

function confirmLove() {
    const summary = hoverCount > 0
        ? ` (ทำไมใช้ตั้ง${hoverCount} ครั้งถึงจะกดรักเค้า)`
        : '';
